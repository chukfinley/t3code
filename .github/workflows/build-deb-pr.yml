name: Build .deb on PR

# Builds the Debian package for every pull request so a broken build is caught
# before merge, and attaches the resulting .deb as a downloadable artifact.
# Does NOT create a release.

on:
  # Auto PR trigger disabled — run manually only.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-deb-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-deb:
    name: Build .deb package
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout PR
        uses: actions/checkout@v6

      - name: Inject deb metadata (homepage) into build script
        shell: bash
        run: |
          set -euo pipefail
          # The .deb target (electron-builder FpmTarget) requires `homepage`,
          # which upstream's config omits. Re-inject at build time so the fix
          # survives upstream merges. Idempotent via a marker.
          node - <<'NODE'
          const fs = require("node:fs");
          const file = "scripts/build-desktop-artifact.ts";
          const marker = "/* fork-deb-homepage */";
          const homepage = "https://github.com/chukfinley/t3code";
          let src = fs.readFileSync(file, "utf8");
          if (src.includes(marker)) {
            console.log("homepage already injected, skipping");
            process.exit(0);
          }
          const anchor = 'description: "T3 Code desktop build",';
          if (!src.includes(anchor)) {
            console.error("ERROR: anchor not found — build script structure changed; update this patch");
            process.exit(1);
          }
          src = src.replace(
            anchor,
            `${anchor}\n    homepage: "${homepage}", ${marker}`,
          );
          fs.writeFileSync(file, src);
          console.log("Injected homepage into staged package.json metadata");
          NODE

      - name: Setup Vite+ (vp toolchain)
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Derive build version
        id: version
        run: |
          PR="${{ github.event.pull_request.number || github.run_number }}"
          SHA="$(git rev-parse --short HEAD)"
          VERSION="0.0.0-pr${PR}.${SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building PR version: $VERSION"

      - name: Install dpkg dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot imagemagick

      - name: Build desktop artifact (.deb)
        shell: bash
        run: |
          vp run dist:desktop:artifact \
            --platform linux \
            --target deb \
            --arch x64 \
            --build-version "${{ steps.version.outputs.version }}" \
            --verbose

      - name: Collect .deb artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish
          for file in release/*.deb; do
            if [ -f "$file" ]; then
              cp "$file" release-publish/
              echo "Found .deb file: $file"
            fi
          done
          ls -la release-publish/

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-package-pr${{ github.event.pull_request.number || github.run_number }}
          path: release-publish/*.deb
          if-no-files-found: error
